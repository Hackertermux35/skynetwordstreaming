<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Skynet Word Streaming</title>
<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600;700&display=swap" rel="stylesheet">

<style>
body{
    margin:0;
    font-family:'Poppins',sans-serif;
    background:linear-gradient(135deg,#0f172a,#1e293b);
    color:white;
}
header{
    padding:20px;
    text-align:center;
    font-size:26px;
    font-weight:700;
}
.container{
    display:grid;
    grid-template-columns:2fr 1fr;
    gap:20px;
    padding:20px;
}
.products{
    display:grid;
    grid-template-columns:repeat(auto-fit,minmax(180px,1fr));
    gap:20px;
}
.card{
    background:#1e293b;
    padding:20px;
    border-radius:15px;
    text-align:center;
    transition:.3s;
    animation:fadeIn .8s ease-in-out;
}
.card:hover{
    transform:scale(1.05);
}
.card img{
    width:90px;
    height:90px;
    object-fit:contain;
}
button{
    background:#22c55e;
    border:none;
    padding:10px 15px;
    border-radius:8px;
    cursor:pointer;
    font-weight:600;
    margin-top:10px;
}
button:hover{
    background:#16a34a;
}
.cart{
    background:#111827;
    padding:20px;
    border-radius:15px;
}
.cart-item{
    display:flex;
    justify-content:space-between;
    margin-bottom:10px;
}
.total{
    font-weight:700;
    margin-top:10px;
}
input{
    width:100%;
    padding:8px;
    margin:5px 0;
    border-radius:6px;
    border:none;
}
@keyframes fadeIn{
    from{opacity:0;transform:translateY(20px);}
    to{opacity:1;transform:translateY(0);}
}
@media(max-width:900px){
    .container{grid-template-columns:1fr;}
}
</style>
</head>
<body>

<header>Skynet Word Streaming</header>

<div class="container">

<div class="products">

<div class="card">
<img src="https://upload.wikimedia.org/wikipedia/commons/0/08/Netflix_2015_logo.svg">
<h3>Netflix</h3>
<p>$299 MXN</p>
<button onclick="addToCart('Netflix',299)">Agregar</button>
</div>

<div class="card">
<img src="https://upload.wikimedia.org/wikipedia/commons/3/3e/Disney%2B_logo.svg">
<h3>Disney+</h3>
<p>$249 MXN</p>
<button onclick="addToCart('Disney+',249)">Agregar</button>
</div>

<div class="card">
<img src="https://upload.wikimedia.org/wikipedia/commons/1/19/Spotify_logo_without_text.svg">
<h3>Spotify</h3>
<p>$199 MXN</p>
<button onclick="addToCart('Spotify',199)">Agregar</button>
</div>

<div class="card">
<img src="https://upload.wikimedia.org/wikipedia/commons/0/08/Canva_icon_2021.svg">
<h3>Canva Pro</h3>
<p>$179 MXN</p>
<button onclick="addToCart('Canva Pro',179)">Agregar</button>
</div>

</div>

<div class="cart">
<h3>🛒 Carrito</h3>
<div id="cartItems"></div>
<div class="total">Total: $<span id="total">0</span> MXN</div>

<hr>

<input type="text" id="name" placeholder="Nombre">
<input type="email" id="email" placeholder="Correo">
<input type="text" id="phone" placeholder="Teléfono">
<input type="file" id="receipt">

<button onclick="procesarPago()">Pagar Ahora</button>
<button onclick="enviarPedido()">Confirmar Pedido</button>
</div>

</div>

<script src="https://cdn.jsdelivr.net/npm/@emailjs/browser@3/dist/email.min.js"></script>

<script>
emailjs.init("OXkuFnwVts3O4G69E");

let cart=[];
let total=0;

function addToCart(name,price){
    cart.push({name,price});
    total+=price;
    renderCart();
}

function renderCart(){
    const cartDiv=document.getElementById("cartItems");
    cartDiv.innerHTML="";
    cart.forEach((item,index)=>{
        cartDiv.innerHTML+=`
        <div class="cart-item">
            ${item.name} - $${item.price}
            <button onclick="removeItem(${index})">X</button>
        </div>`;
    });
    document.getElementById("total").innerText=total;
}

function removeItem(index){
    total-=cart[index].price;
    cart.splice(index,1);
    renderCart();
}

function procesarPago(){
    alert("Aquí puedes integrar Stripe, PayPal o MercadoPago.");
    // Ejemplo simple:
    window.open("https://www.paypal.com", "_blank");
}

function enviarPedido(){

    if(cart.length===0){
        alert("Carrito vacío");
        return;
    }

    const file=document.getElementById("receipt").files[0];

    const reader=new FileReader();
    reader.onload=function(){
        const base64=reader.result.split(',')[1];

        const templateParams={
            order_number:"ORD-"+Date.now(),
            name:document.getElementById("name").value,
            email:document.getElementById("email").value,
            phone:document.getElementById("phone").value,
            total:"$"+total+" MXN",
            products:cart.map(p=>p.name+" - $"+p.price).join("\n"),
            attachment:base64
        };

        emailjs.send(
            "service_wai2iyo",
            "TU_TEMPLATE_ID_AQUI",
            templateParams
        )
        .then(()=>alert("✅ Pedido enviado correctamente"))
        .catch(err=>console.log(err));
    };

    if(file){
        reader.readAsDataURL(file);
    }else{
        alert("Adjunta el comprobante");
    }
}
</script>

</body>
</html>
